name: release-packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EVCODE_CARGO_BUILD_JOBS: "2"
      EVCODE_CARGO_REAL_BIN: /home/runner/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/cargo
      EVCODE_RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev pkg-config

      - name: Verify
        run: |
          python3 scripts/verify/check_contracts.py
          python3 scripts/verify/check_proof_docs.py
          python3 scripts/verify/check_distribution_assembly.py
          python3 scripts/verify/check_host_bridge.py
          python3 scripts/verify/run_hybrid_baseline.py --repo-root . --json
          python3 scripts/verify/validate_distribution_portability.py --repo-root . --json
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Build Release Packages
        run: |
          python3 scripts/release/build_release_packages.py

      - name: Verify Release Packages
        run: |
          VERSION=$(python3 scripts/release/print_version.py)
          python3 scripts/verify/check_release_packages.py --manifest dist/releases/evcode-v$VERSION/artifacts/release-manifest.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evcode-release-packages
          path: dist/releases/**
